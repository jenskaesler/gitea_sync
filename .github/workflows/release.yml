name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update manifest version
        run: |
          sed -i 's/"version": ".*"/"version": "${{ steps.version.outputs.VERSION }}"/' \
            custom_components/gitea_sync/manifest.json

      - name: Create zip archive
        run: |
          cd custom_components
          zip -r ../gitea_sync.zip gitea_sync/
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Gitea Config Sync ${{ github.ref_name }}"
          body: |
            ## Gitea Config Sync ${{ github.ref_name }}

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

            ### Installation
            Install via HACS or download `gitea_sync.zip` and extract to `/config/custom_components/`.
          draft: false
          prerelease: false
          files: gitea_sync.zip
          generate_release_notes: true
